name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      TIANGONG_LCA_TIDAS_SDK_DIR: ${{ github.workspace }}/.ci/tidas-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout tidas-sdk
        uses: actions/checkout@v4
        with:
          repository: tiangong-lca/tidas-sdk
          path: .ci/tidas-sdk

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Bootstrap and build tidas-sdk
        working-directory: .ci/tidas-sdk
        run: |
          npm run bootstrap
          npm run build:typescript

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Coverage gate
        run: npm run test:coverage

      - name: Assert 100% coverage
        run: npm run test:coverage:assert-full

      - name: Aggregate prepush gate
        if: matrix.os == 'windows-latest'
        run: npm run prepush:gate
